<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Show Inventory Management</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@500,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#f4f2ed; --surface:#ffffff; --surface-2:#efeae2; --text:#16202b; --muted:#5d6771; --primary:#0a4d7a; --primary-2:#0b3458; --accent:#0f7b87; --danger:#b13c3c; --border:#d8d0c5; --radius:18px; --shadow:0 12px 28px rgba(0,0,0,.08); }
    *{box-sizing:border-box} html{font-size:17px} body{margin:0;font-family:Satoshi,sans-serif;background:var(--bg);color:var(--text);line-height:1.55} button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,#0c2338 0,#0e304e 100%);color:#f2f7fb;padding:24px 20px;position:sticky;top:0;height:100vh}.logo-panel{background:#fff;border-radius:22px;padding:18px;box-shadow:0 18px 34px rgba(0,0,0,.28);display:flex;justify-content:center;align-items:center;margin-bottom:14px;border:1px solid rgba(255,255,255,.28)}.logo-panel img{width:100%;max-width:220px;height:auto;display:block}.brand-sub{margin:0 0 22px;text-align:center;color:#e9f1f7;font-size:1rem;font-weight:700;letter-spacing:.02em}.nav button{width:100%;text-align:left;border:0;background:transparent;color:#e8f1f6;padding:14px 16px;border-radius:14px;margin:7px 0;cursor:pointer;font-weight:700;font-size:1rem}.nav button.active,.nav button:hover{background:rgba(255,255,255,.12)}.main{padding:36px 40px 100px}.topbar{display:flex;justify-content:space-between;gap:22px;align-items:flex-start;margin-bottom:34px;flex-wrap:wrap}.topbar h1{margin:0;font-size:2.15rem;line-height:1.1}.helper{color:var(--muted);font-size:1rem;max-width:70ch}.btn{border:0;border-radius:14px;padding:12px 16px;cursor:pointer;font-weight:700}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-2)}.btn-secondary{background:var(--surface-2);color:var(--text)}.btn-danger{background:var(--danger);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed}.page{display:none}.page.active{display:block}.grid{display:grid;gap:24px}.overview-panels{margin-top:34px;align-items:start}.cards{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}.card h2,.card h3,.card h4,.card p{margin-top:0}.section-head{display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:18px}.metric{font-size:2rem;font-weight:700;line-height:1}.muted{color:var(--muted)}.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.full{grid-column:1/-1} label{display:grid;gap:10px;font-size:.98rem;font-weight:700} input,select,textarea{width:100%;padding:14px 15px;border-radius:13px;border:1px solid var(--border);background:#fff} textarea{resize:vertical}.list{display:grid;gap:18px}.item-card{display:grid;gap:18px}.item-layout{display:grid;grid-template-columns:132px 1fr;gap:22px;align-items:start}.item-layout.no-photo{grid-template-columns:1fr}.thumb{width:132px;height:132px;object-fit:cover;border-radius:16px;border:1px solid var(--border);background:#f6f3ee}.stats-row{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-top:16px}.stat-box{background:var(--surface-2);border-radius:14px;padding:16px}.stat-box strong{display:block;font-size:1.2rem}.pill{display:inline-flex;padding:7px 11px;border-radius:999px;font-size:.85rem;font-weight:700;background:#dcebf6;color:#16476b}.pill.closed{background:#e8e0d8;color:#705947}.button-row{display:flex;gap:14px;flex-wrap:wrap}.summary{white-space:pre-wrap;background:var(--surface-2);padding:20px;border-radius:15px;border:1px solid var(--border);font-size:1rem}.toast{position:fixed;right:18px;bottom:18px;background:#10202f;color:#fff;padding:14px 16px;border-radius:14px;opacity:0;transform:translateY(8px);transition:.2s;font-weight:700}.toast.show{opacity:1;transform:translateY(0)}.small{font-size:.93rem}
    @media (max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.stats-row{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:700px){html{font-size:16px}.main{padding:22px}.item-layout,.item-layout.no-photo{grid-template-columns:1fr}.thumb{width:100%;max-width:180px;height:auto;aspect-ratio:1/1}.stats-row{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>

    function loadDemo(){ state.inventory=[{id:uid('item'),name:'Pull-up banner',dimensions:'2.0m x 0.85m',category:'Displays',quantity:6,inUse:1,damaged:0,missing:0,notes:'Main branding banner',photo:''},{id:uid('item'),name:'Brochure stand',dimensions:'1.5m x 0.4m',category:'Displays',quantity:3,inUse:0,damaged:0,missing:0,notes:'Metal floor stand',photo:''},{id:uid('item'),name:'TV screen 55',dimensions:'1.25m x 0.75m',category:'Electronics',quantity:2,inUse:1,damaged:0,missing:0,notes:'With HDMI cable',photo:''},{id:uid('item'),name:'Sample kit case',dimensions:'0.5m x 0.35m',category:'Samples',quantity:10,inUse:1,damaged:1,missing:0,notes:'Client demo samples',photo:''},{id:uid('item'),name:'Table cloth',dimensions:'2.4m x 1.2m',category:'Booth furniture',quantity:8,inUse:0,damaged:0,missing:0,notes:'Blue branded cloth',photo:''}]; state.shows=[{id:uid('show'),name:'Ozwater Expo',location:'Brisbane Convention Centre',date:todayPlus(4),status:'Open',notes:'Main booth setup',lines:[]},{id:uid('show'),name:'Mining Tech Forum',location:'Gold Coast',date:todayPlus(12),status:'Open',notes:'Smaller stand',lines:[]}]; state.history=[]; state.selectedShowId=state.shows[0].id; const banner=state.inventory[0], tv=state.inventory[2], sample=state.inventory[3], show=state.shows[0]; show.lines.push({itemId:banner.id,checkedOut:2,returned:1,damaged:0,missing:0}); show.lines.push({itemId:tv.id,checkedOut:1,returned:0,damaged:0,missing:0}); show.lines.push({itemId:sample.id,checkedOut:4,returned:2,damaged:1,missing:0}); addHistory('Check-out',show.name,banner.name,2,'Sent to booth'); addHistory('Return',show.name,banner.name,1,'One banner returned'); addHistory('Check-out',show.name,tv.name,1,'Screen sent to booth'); addHistory('Check-out',show.name,sample.name,4,'Samples allocated'); addHistory('Damaged',show.name,sample.name,1,'Sample case broken on return'); renderAll(); }
    async function loadApp(){ if(!db) return loadDemo(); try{ await dbRefresh(); renderAll(); toast('Supabase connected.'); }catch(err){ console.error(err); toast('Supabase failed. Using demo data.'); loadDemo(); } }

    els.editItemForm.addEventListener('submit', e => { e.preventDefault(); const item=itemById(state.selectedItemId); if(!item) return toast('Select an item first.'); const qty=Number(els.editItemQty.value||0), damaged=Number(els.editItemDamaged.value||0), missing=Number(els.editItemMissing.value||0); if(qty<0||damaged<0||missing<0) return toast('Values cannot be negative.'); if(damaged+missing+item.inUse>qty) return toast('Total quantity is too low for in-use, damaged, and missing stock.'); askConfirm('Save changes to this inventory item?', async ()=>{ if(db){ const { error } = await db.from('inventory_items').update({ name:els.editItemName.value.trim(), dimensions:els.editItemDimensions.value.trim(), category:els.editItemCategory.value.trim(), quantity:qty, damaged, missing, notes:els.editItemNotes.value.trim() }).eq('id', item.id); if(error) return toast('Could not update item.'); await dbAddHistory('Item Updated','',item.name,0,'Inventory item updated'); await dbRefresh(); renderAll(); populateItemEditor(itemById(state.selectedItemId)); return toast('Inventory item updated.'); } item.name=els.editItemName.value.trim(); item.dimensions=els.editItemDimensions.value.trim(); item.category=els.editItemCategory.value.trim(); item.quantity=qty; item.damaged=damaged; item.missing=missing; item.notes=els.editItemNotes.value.trim(); renderAll(); populateItemEditor(item); toast('Inventory item updated.'); }); });

    els.deleteItemBtn.addEventListener('click', async ()=>{ const item=itemById(state.selectedItemId); if(!item) return toast('Select an item first.'); const usedInShows=state.shows.some(show=>show.lines.some(line=>line.itemId===item.id && line.checkedOut>0)); if(usedInShows) return toast('Cannot delete item because it exists in show records. Remove it from shows first.'); if(!window.confirm('Delete this inventory item?')) return; if(db){ const { error } = await db.from('inventory_items').delete().eq('id', item.id); if(error) return toast('Could not delete item.'); await dbAddHistory('Item Deleted','',item.name,0,'Inventory item deleted'); await dbRefresh(); state.selectedItemId = state.inventory[0]?.id || null; renderAll(); populateItemEditor(itemById(state.selectedItemId)); return toast('Inventory item deleted.'); } state.inventory = state.inventory.filter(i=>i.id!==item.id); state.selectedItemId = state.inventory[0]?.id || null; renderAll(); populateItemEditor(itemById(state.selectedItemId)); toast('Inventory item deleted.'); });

    els.createShowForm.addEventListener('submit', async e => { e.preventDefault(); const show={ id:uid('show'), name:els.newShowName.value.trim(), location:els.newShowLocation.value.trim(), date:els.newShowDate.value, status:els.newShowStatus.value, notes:els.newShowNotes.value.trim(), lines:[] }; if(!show.name||!show.date) return toast('Show name and date are required.'); if(db){ const { error } = await db.from('trade_shows').insert([{ name:show.name, location:show.location, date:show.date, status:show.status, notes:show.notes }]); if(error) return toast('Could not create show.'); await dbAddHistory('Show Created',show.name,'',0,'Show created'); await dbRefresh(); renderAll(); els.createShowForm.reset(); els.newShowStatus.value='Open'; return toast('Show created.'); } state.shows.push(show); state.selectedShowId=show.id; els.createShowForm.reset(); els.newShowStatus.value='Open'; renderAll(); populateShowEditor(show); toast('Show created.'); });
    els.editShowForm.addEventListener('submit', async e => { e.preventDefault(); const show=showById(state.selectedShowId); if(!show) return toast('Select a show first.'); if(!els.editShowName.value.trim()||!els.editShowDate.value) return toast('Show name and date are required.'); if(db){ const { error } = await db.from('trade_shows').update({ name:els.editShowName.value.trim(), location:els.editShowLocation.value.trim(), date:els.editShowDate.value, status:els.editShowStatus.value, notes:els.editShowNotes.value.trim() }).eq('id', show.id); if(error) return toast('Could not update show.'); await dbAddHistory('Show Updated',show.name,'',0,'Show updated'); await dbRefresh(); renderAll(); populateShowEditor(showById(state.selectedShowId)); return toast('Show updated.'); } show.name=els.editShowName.value.trim(); show.location=els.editShowLocation.value.trim(); show.date=els.editShowDate.value; show.status=els.editShowStatus.value; show.notes=els.editShowNotes.value.trim(); renderAll(); populateShowEditor(show); toast('Show updated.'); });
    els.deleteShowBtn.addEventListener('click', async ()=>{ const show=showById(state.selectedShowId); if(!show) return toast('Select a show first.'); if(!window.confirm('Delete this show? Pending items will be returned to stock, while damaged and missing records will remain.')) return; if(db){ for(const line of show.lines){ const item=itemById(line.itemId); const unresolved=pendingQty(line); if(unresolved>0) await dbAddHistory('Return',show.name,item?.name||'Item',unresolved,'Auto-returned because show was deleted'); } const { error } = await db.from('trade_shows').delete().eq('id', show.id); if(error) return toast('Could not delete show.'); await dbRefresh(); renderAll(); populateShowEditor(showById(state.selectedShowId)); return toast('Show deleted. Pending stock returned, damaged and missing records kept.'); } show.lines.forEach(line=>{ const item=itemById(line.itemId); const unresolved=pendingQty(line); if(unresolved>0){ line.returned+=unresolved; if(item) item.inUse=Math.max(0,item.inUse-unresolved); addHistory('Return',show.name,item?.name||'Item',unresolved,'Auto-returned because show was deleted'); }}); state.shows=state.shows.filter(s=>s.id!==show.id); state.selectedShowId=state.shows[0]?.id||null; renderAll(); populateShowEditor(showById(state.selectedShowId)); toast('Show deleted. Pending stock returned, damaged and missing records kept.'); });
    els.closeShowBtn.addEventListener('click', async ()=>{ const show=showById(els.returnShow.value); if(!show) return toast('Select an open show.'); if(!window.confirm('Close this show and return all still-in-use items to stock?')) return; if(db){ for(const line of show.lines){ const unresolved=pendingQty(line); if(unresolved>0){ const { error } = await db.from('show_lines').update({ returned: line.returned + unresolved }).eq('show_id', show.id).eq('item_id', line.itemId); if(error) return toast('Could not close show.'); const item=itemById(line.itemId); await dbAddHistory('Return',show.name,item?.name||'Item',unresolved,'Auto-returned because show was closed'); } } const { error: statusErr } = await db.from('trade_shows').update({ status:'Closed' }).eq('id', show.id); if(statusErr) return toast('Could not close show.'); await dbRefresh(); await syncAllInUse(); await dbRefresh(); renderAll(); populateShowEditor(showById(state.selectedShowId)); return toast('Show closed and stock returned.'); } show.lines.forEach(line=>{ const unresolved=pendingQty(line); if(unresolved>0){ const item=itemById(line.itemId); line.returned+=unresolved; if(item) item.inUse=Math.max(0,item.inUse-unresolved); addHistory('Return',show.name,item?.name||'Item',unresolved,'Auto-returned because show was closed'); }}); show.status='Closed'; renderAll(); populateShowEditor(show); toast('Show closed and stock returned.'); });
    els.addItemForm.addEventListener('submit', async e => { e.preventDefault(); const item={ id:uid('item'), name:els.itemName.value.trim(), dimensions:els.itemDimensions.value.trim(), category:els.itemCategory.value.trim(), quantity:Number(els.itemQty.value||0), inUse:0, damaged:0, missing:0, notes:els.itemNotes.value.trim(), photo:els.itemPhotoPreview.getAttribute('src')||'' }; if(!item.name||!item.category||item.quantity<0) return toast('Enter valid item details.'); if(db){ const { error } = await db.from('inventory_items').insert([{ name:item.name, dimensions:item.dimensions, category:item.category, quantity:item.quantity, in_use:0, damaged:0, missing:0, notes:item.notes, photo:item.photo || null }]); if(error) return toast('Could not add item.'); await dbAddHistory('Item Created','',item.name,item.quantity,'Item added'); await dbRefresh(); renderAll(); els.addItemForm.reset(); els.itemQty.value=1; els.itemPhotoPreviewWrap.style.display='none'; els.itemPhotoPreview.removeAttribute('src'); return toast('Item added.'); } state.inventory.push(item); state.selectedItemId=item.id; els.addItemForm.reset(); els.itemQty.value=1; els.itemPhotoPreviewWrap.style.display='none'; els.itemPhotoPreview.removeAttribute('src'); renderAll(); populateItemEditor(item); toast('Item added.'); });
    els.saveCheckout.addEventListener('click', async ()=>{ if(!state.checkoutDraft.length) return toast('No pending check-out lines.'); if(db){ const grouped={}; state.checkoutDraft.forEach(l=>(grouped[l.showId] ||= []).push(l)); for(const [showId,lines] of Object.entries(grouped)){ const show=showById(showId); for(const line of lines){ const item=itemById(line.itemId); const existing=show.lines.find(x=>x.itemId===line.itemId); if(existing){ const { error } = await db.from('show_lines').update({ checked_out: existing.checkedOut + line.qty }).eq('show_id', showId).eq('item_id', line.itemId); if(error) return toast('Could not save check-out.'); } else { const { error } = await db.from('show_lines').insert([{ show_id:showId, item_id:line.itemId, checked_out:line.qty, returned:0, damaged:0, missing:0 }]); if(error) return toast('Could not save check-out.'); } await dbAddHistory('Check-out',show.name,item?.name||'Item',line.qty,'Recorded in app'); } } state.checkoutDraft=[]; await dbRefresh(); await syncAllInUse(); await dbRefresh(); renderAll(); populateShowEditor(showById(state.selectedShowId)); return toast('Check-out saved.'); } const grouped={}; state.checkoutDraft.forEach(l=>{ (grouped[l.showId] ||= []).push(l); }); Object.entries(grouped).forEach(([showId,lines])=>{ const show=showById(showId); lines.forEach(line=>{ const item=itemById(line.itemId); item.inUse+=line.qty; const existing=show.lines.find(x=>x.itemId===line.itemId); if(existing) existing.checkedOut+=line.qty; else show.lines.push({ itemId:line.itemId, checkedOut:line.qty, returned:0, damaged:0, missing:0 }); addHistory('Check-out',show.name,item.name,line.qty,'Recorded in demo'); }); }); state.checkoutDraft=[]; renderAll(); populateShowEditor(showById(state.selectedShowId)); toast('Check-out saved.'); });
    els.saveReturn.addEventListener('click', async ()=>{ const show=showById(els.returnShow.value); if(!show) return toast('Select an open show.'); let changed=false; if(db){ for(const line of show.lines.filter(l=>pendingQty(l)>0)){ const returned=Number(document.querySelector(`[data-returned="${line.itemId}"]`)?.value||0), damaged=Number(document.querySelector(`[data-damaged="${line.itemId}"]`)?.value||0), missing=Number(document.querySelector(`[data-missing="${line.itemId}"]`)?.value||0), remain=pendingQty(line); if(returned+damaged+missing===0) continue; if(returned<0||damaged<0||missing<0||returned+damaged+missing>remain) return toast('Invalid return quantities entered.'); changed=true; const item=itemById(line.itemId); const { error } = await db.from('show_lines').update({ returned: line.returned + returned, damaged: line.damaged + damaged, missing: line.missing + missing }).eq('show_id', show.id).eq('item_id', line.itemId); if(error) return toast('Could not save return.'); if(damaged||missing){ const { error:itemErr } = await db.from('inventory_items').update({ damaged: item.damaged + damaged, missing: item.missing + missing }).eq('id', item.id); if(itemErr) return toast('Could not update stock totals.'); } if(returned) await dbAddHistory('Return',show.name,item.name,returned,'Returned in good condition'); if(damaged) await dbAddHistory('Damaged',show.name,item.name,damaged,'Marked damaged'); if(missing) await dbAddHistory('Missing',show.name,item.name,missing,'Marked missing'); }
        if(!changed) return toast('No return quantities entered.'); await dbRefresh(); for(const item of state.inventory){ const finalInUse = state.shows.filter(s=>s.status==='Open').reduce((a,s)=>a+s.lines.filter(l=>l.itemId===item.id).reduce((b,l)=>b+pendingQty(l),0),0); const { error:updateErr } = await db.from('inventory_items').update({ in_use: finalInUse, damaged: item.damaged, missing: item.missing }).eq('id', item.id); if(updateErr) return toast('Could not update stock totals.'); } await dbRefresh(); renderAll(); populateShowEditor(showById(state.selectedShowId)); return toast('Return saved. Damaged and missing items removed from available stock.'); }
      for(const line of show.lines.filter(l=>pendingQty(l)>0)){ const returned=Number(document.querySelector(`[data-returned="${line.itemId}"]`)?.value||0), damaged=Number(document.querySelector(`[data-damaged="${line.itemId}"]`)?.value||0), missing=Number(document.querySelector(`[data-missing="${line.itemId}"]`)?.value||0), remain=pendingQty(line); if(returned+damaged+missing===0) continue; if(returned<0||damaged<0||missing<0||returned+damaged+missing>remain) return toast('Invalid return quantities entered.'); const item=itemById(line.itemId); line.returned+=returned; line.damaged+=damaged; line.missing+=missing; item.inUse=Math.max(0,item.inUse-returned-damaged-missing); if(damaged) item.damaged+=damaged; if(missing) item.missing+=missing; if(returned) addHistory('Return',show.name,item.name,returned,'Returned in good condition'); if(damaged) addHistory('Damaged',show.name,item.name,damaged,'Marked damaged'); if(missing) addHistory('Missing',show.name,item.name,missing,'Marked missing'); changed=true; } if(!changed) return toast('No return quantities entered.'); renderAll(); populateShowEditor(showById(state.selectedShowId)); toast('Return saved. Damaged and missing items removed from available stock.'); });
    els.navBtns.forEach(btn=>btn.addEventListener('click',()=>setPage(btn.dataset.page))); els.inventorySearch.addEventListener('input',renderInventory); els.showSearch.addEventListener('input',renderShows); els.checkoutSearch.addEventListener('input',renderCheckout); els.checkoutShow.addEventListener('change',()=>{ state.selectedShowId=els.checkoutShow.value; if(state.selectedShowId) els.returnShow.value=state.selectedShowId; renderCheckout(); }); els.returnShow.addEventListener('change',renderReturns); els.itemPhoto.addEventListener('change',e=>{ const file=e.target.files&&e.target.files[0]; if(!file){ els.itemPhotoPreviewWrap.style.display='none'; els.itemPhotoPreview.removeAttribute('src'); return; } const r=new FileReader(); r.onload=ev=>{ els.itemPhotoPreview.src=ev.target.result; els.itemPhotoPreviewWrap.style.display='block'; }; r.readAsDataURL(file); });
    document.addEventListener('click',e=>{ const showBtn=e.target.closest('[data-open-show]'); if(showBtn){ state.selectedShowId=showBtn.dataset.openShow; populateShowEditor(showById(state.selectedShowId)); toast('Show selected.'); } const itemBtn=e.target.closest('[data-select-item]'); if(itemBtn){ state.selectedItemId=itemBtn.dataset.selectItem; populateItemEditor(itemById(state.selectedItemId)); toast('Item selected for editing.'); } const addBtn=e.target.closest('[data-add-checkout]'); if(addBtn){ const item=itemById(addBtn.dataset.addCheckout), show=showById(els.checkoutShow.value); if(!item||!show) return toast('Select an open show first.'); const qty=Number(document.querySelector(`[data-qty="${item.id}"]`)?.value||0); if(!qty||qty<1) return toast('Enter a valid quantity.'); if(qty>availableQty(item)) return toast('Quantity exceeds available stock.'); state.checkoutDraft.push({showId:show.id,itemId:item.id,qty}); toast('Line added to pending check-out.'); } });
    loadApp();
  </script>
